<!DOCTYPE html>
<html data-theme="light">
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<style>body{margin:0;padding:16px;background:var(--background-default);}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Switch, Checkbox } = window.OutpayDesignSystem_3f8d0c;

function Demo() {
  const [on, setOn] = React.useState(true);
  const [checked, setChecked] = React.useState(true);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:16, fontFamily:'var(--font-sans)', maxWidth:360}}>
      <Input label="Store name" placeholder="Acme Coffee Co." />
      <Input label="Wallet address" defaultValue="0x71C7...976F" error="Not a valid Base address" />
      <div style={{display:'flex', gap:24, alignItems:'center'}}>
        <div style={{display:'flex', gap:8, alignItems:'center'}}><Switch checked={on} onChange={setOn} /><span style={{fontSize:13}}>Accept USDC</span></div>
        <div style={{display:'flex', gap:8, alignItems:'center'}}><Switch checked={false} disabled /><span style={{fontSize:13, color:'var(--foreground-lighter)'}}>Accept USDT (soon)</span></div>
      </div>
      <div style={{display:'flex', gap:8, alignItems:'center'}}><Checkbox checked={checked} onChange={setChecked} /><span style={{fontSize:13}}>Send me webhook retry alerts</span></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
