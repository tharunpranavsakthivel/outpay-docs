<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Green" subtitle="Primary brand scale (--color-brand-*), light theme" -->
<!DOCTYPE html>
<html data-theme="light">
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--background-default);font-family:var(--font-mono);}
  .row{display:flex;gap:6px;}
  .sw{flex:1;height:64px;border-radius:6px;display:flex;align-items:flex-end;padding:6px;font-size:10px;color:rgba(0,0,0,.55);}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-brand-100)">100</div>
    <div class="sw" style="background:var(--color-brand-300)">300</div>
    <div class="sw" style="background:var(--color-brand-500)">500</div>
    <div class="sw" style="background:var(--color-brand-700)">700</div>
    <div class="sw" style="background:var(--color-brand-900)">900</div>
    <div class="sw" style="background:var(--color-brand-1000)">1000</div>
    <div class="sw" style="background:var(--color-brand-1100);color:#fff">1100</div>
    <div class="sw" style="background:var(--color-brand-1200);color:#fff">1200</div>
  </div>
</body>
</html>
