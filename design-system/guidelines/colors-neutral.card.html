<!-- @dsCard group="Colors" viewport="700x150" name="Neutral — Gray/Slate" subtitle="Neutral surface ramp used for borders, disabled states, dividers" -->
<!DOCTYPE html>
<html data-theme="light">
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--background-default);font-family:var(--font-mono);}
  .row{display:flex;gap:6px;margin-bottom:6px;}
  .sw{flex:1;height:28px;border-radius:4px;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-gray-100)"></div>
    <div class="sw" style="background:var(--color-gray-300)"></div>
    <div class="sw" style="background:var(--color-gray-500)"></div>
    <div class="sw" style="background:var(--color-gray-700)"></div>
    <div class="sw" style="background:var(--color-gray-900)"></div>
    <div class="sw" style="background:var(--color-gray-1100)"></div>
    <div class="sw" style="background:var(--color-gray-1200)"></div>
  </div>
  <div class="row">
    <div class="sw" style="background:var(--color-slate-100)"></div>
    <div class="sw" style="background:var(--color-slate-300)"></div>
    <div class="sw" style="background:var(--color-slate-500)"></div>
    <div class="sw" style="background:var(--color-slate-700)"></div>
    <div class="sw" style="background:var(--color-slate-900)"></div>
    <div class="sw" style="background:var(--color-slate-1100)"></div>
    <div class="sw" style="background:var(--color-slate-1200)"></div>
  </div>
</body>
</html>
