<!DOCTYPE html>
<html data-theme="light">
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--background-default);font-family:var(--font-sans);}
  .row{display:flex;flex-wrap:wrap;gap:20px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:6px;width:56px;}
  .item img{width:20px;height:20px;}
  .item span{font-size:10px;color:var(--foreground-lighter);text-align:center;}
</style>
</head>
<body>
<div class="row">
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/wallet.svg"><span>wallet</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/qr-code.svg"><span>qr-code</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/copy.svg"><span>copy</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/check-circle-2.svg"><span>check-circle</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/alert-triangle.svg"><span>alert-triangle</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/webhook.svg"><span>webhook</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/key-round.svg"><span>key-round</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/external-link.svg"><span>external-link</span></div>

  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/settings.svg"><span>settings</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/store.svg"><span>store</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/badge-check.svg"><span>badge-check</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/loader-2.svg"><span>loader-2</span></div>
  <div class="item"><img src="https://unpkg.com/lucide-static@latest/icons/plus.svg"><span>plus</span></div>

</html>
