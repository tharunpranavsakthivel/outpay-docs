<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="sm 4px (buttons/inputs) · lg 8px (cards) · xl 16px (dialogs) · pill (pills)" -->
<!DOCTYPE html>
<html data-theme="light">
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:16px;background:var(--background-default);font-family:var(--font-mono);font-size:10px;color:var(--foreground-lighter);}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .box{background:var(--color-brand-400);border:1px solid var(--border-brand);width:72px;height:56px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;}
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius:var(--radius-sm)">sm 4px</div>
    <div class="box" style="border-radius:var(--radius-lg)">lg 8px</div>
    <div class="box" style="border-radius:var(--radius-xl)">xl 16px</div>
    <div class="box" style="border-radius:999px">pill</div>
  </div>
</body>
</html>
